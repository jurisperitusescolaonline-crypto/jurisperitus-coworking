name: Jurisperitus — Publicação Instagram

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período de publicação'
        required: true
        default: 'manha'
        type: choice
        options:
          - manha
          - tarde
          - noite

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install "instagrapi==2.1.2" pillow requests pycryptodomex pydantic

      - name: Determinar período
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIODO=${{ github.event.inputs.periodo }}" >> $GITHUB_ENV
          else
            HORA=$(date -u +%H)
            if [ "$HORA" = "10" ]; then echo "PERIODO=manha" >> $GITHUB_ENV
            elif [ "$HORA" = "15" ]; then echo "PERIODO=tarde" >> $GITHUB_ENV
            else echo "PERIODO=noite" >> $GITHUB_ENV
            fi
          fi

      - name: Publicar no Instagram
        env:
          IG_USUARIO: ${{ secrets.IG_USUARIO }}
          IG_SENHA: ${{ secrets.IG_SENHA }}
          PERIODO: ${{ env.PERIODO }}
        run: |
          set -o pipefail
          python3 publicar_instagram_action.py 2>&1 | tee resultado_instagram.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Salvar log no repositório
        if: always()
        run: |
          git config user.name "Claude Coworking"
          git config user.email "coworking@jurisperitus.com.br"
          echo "Run: $(date '+%d/%m/%Y %H:%M') | Exit: $EXIT_CODE" >> resultado_instagram.txt
          git add resultado_instagram.txt
          git diff --staged --quiet || git commit -m "log: instagram $(date '+%d/%m/%Y %H:%M')"
          git push origin main || true

      - name: Verificar resultado
        if: always()
        run: |
          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ Publicação realizada com sucesso"
          else
            echo "❌ Falha na publicação — ver resultado_instagram.txt"
            exit 1
          fi
