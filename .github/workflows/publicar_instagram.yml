name: Jurisperitus — Instagram Publicacao

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período de publicação'
        required: true
        default: 'manha'
        type: choice
        options:
          - manha
          - tarde
          - noite

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install "instagrapi==2.1.2" pillow requests pycryptodomex pydantic

      - name: Determinar período
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIODO=${{ github.event.inputs.periodo }}" >> $GITHUB_ENV
          else
            HORA=$(date -u +%H)
            if [ "$HORA" = "10" ]; then echo "PERIODO=manha" >> $GITHUB_ENV
            elif [ "$HORA" = "15" ]; then echo "PERIODO=tarde" >> $GITHUB_ENV
            else echo "PERIODO=noite" >> $GITHUB_ENV
            fi
          fi

      - name: Diagnóstico de ambiente
        run: |
          python3 -c "
import sys, datetime
print('Python:', sys.version)
print('Data:', datetime.date.today())
try:
    from instagrapi import Client
    print('instagrapi: OK')
except Exception as e:
    print('instagrapi ERRO:', e)
try:
    from PIL import Image
    print('Pillow: OK')
except Exception as e:
    print('Pillow ERRO:', e)
" 2>&1 | tee diagnostico.txt

      - name: Publicar no Instagram
        env:
          IG_USUARIO: ${{ secrets.IG_USUARIO }}
          IG_SENHA: ${{ secrets.IG_SENHA }}
          PERIODO: ${{ env.PERIODO }}
        run: python3 publicar_instagram_action.py 2>&1 | tee resultado_instagram.txt

      - name: Salvar logs no repositório
        if: always()
        run: |
          git config user.name "Claude Coworking"
          git config user.email "coworking@jurisperitus.com.br"
          git add diagnostico.txt resultado_instagram.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "log: instagram $(date '+%d/%m/%Y %H:%M')"
          git push origin main || true
