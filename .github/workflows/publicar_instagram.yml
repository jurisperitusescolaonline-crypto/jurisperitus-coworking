name: Instagram Jurisperitus

on:
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Periodo de publicacao'
        required: true
        default: 'manha'
        type: choice
        options:
          - manha
          - tarde
          - noite
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install "instagrapi==2.1.2" pillow requests pycryptodomex pydantic

      - name: Determinar periodo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIODO=${{ github.event.inputs.periodo }}" >> $GITHUB_ENV
          else
            HORA=$(date -u +%H)
            if [ "$HORA" = "10" ]; then echo "PERIODO=manha" >> $GITHUB_ENV
            elif [ "$HORA" = "15" ]; then echo "PERIODO=tarde" >> $GITHUB_ENV
            else echo "PERIODO=noite" >> $GITHUB_ENV
            fi
          fi

      - name: Publicar
        env:
          IG_USUARIO: ${{ secrets.IG_USUARIO }}
          IG_SENHA: ${{ secrets.IG_SENHA }}
          PERIODO: ${{ env.PERIODO }}
        run: python3 publicar_instagram_action.py 2>&1 | tee resultado_instagram.txt

      - name: Salvar log
        if: always()
        run: |
          git config user.name "Claude Coworking"
          git config user.email "coworking@jurisperitus.com.br"
          git add resultado_instagram.txt || true
          git diff --staged --quiet || git commit -m "log: instagram $(date '+%d/%m/%Y %H:%M')"
          git push origin main || true
