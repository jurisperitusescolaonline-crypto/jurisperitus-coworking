name: Jurisperitus — Publicação Facebook

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período de publicação'
        required: true
        default: 'manha'
        type: choice
        options:
          - manha
          - tarde
          - noite

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Determinar período
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIODO=${{ github.event.inputs.periodo }}" >> $GITHUB_ENV
          else
            HORA=$(date -u +%H)
            if [ "$HORA" = "10" ]; then echo "PERIODO=manha" >> $GITHUB_ENV
            elif [ "$HORA" = "15" ]; then echo "PERIODO=tarde" >> $GITHUB_ENV
            else echo "PERIODO=noite" >> $GITHUB_ENV
            fi
          fi

      - name: Publicar no Facebook
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          PERIODO: ${{ env.PERIODO }}
        run: python3 publicar_facebook_action.py 2>&1 | tee resultado_publicacao.txt

      - name: Salvar resultado no repositório
        if: always()
        run: |
          git config user.name "Claude Coworking"
          git config user.email "coworking@jurisperitus.com.br"
          git add resultado_publicacao.txt
          git diff --staged --quiet || git commit -m "log: resultado publicação $(date '+%d/%m/%Y %H:%M')"
          git push origin main || true
